<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Стандарт СМР ММ 3.1</title>
<style>
  :root {
    --blue: #1d4ed8;
    --blue-light: #eff6ff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --bg: #f5f6f8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    line-height: 1.5;
  }
  header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    position: sticky;
    top: 0;
  }
  header .title {
    font-size: 17px;
    font-weight: 700;
    margin: 0;
  }
  header .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin: 0;
  }
  header button {
    background: none;
    border: none;
    color: var(--blue);
    font-size: 14px;
    cursor: pointer;
    padding: 0;
  }
  header button:hover { text-decoration: underline; }
  .header-row {
    max-width: 880px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  nav.crumbs {
    max-width: 880px;
    margin: 0 auto;
    padding: 12px 20px 0;
    font-size: 13px;
    color: var(--muted);
  }
  nav.crumbs span.crumb-link {
    color: var(--blue);
    cursor: pointer;
  }
  nav.crumbs span.crumb-link:hover { text-decoration: underline; }
  main {
    max-width: 880px;
    margin: 0 auto;
    padding: 16px 20px 60px;
  }
  .intro {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .intro h2 {
    margin: 0 0 4px;
    font-size: 18px;
  }
  .intro p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
  }
  .card-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
  }
  .card-btn:hover {
    border-color: var(--blue);
    background: var(--blue-light);
  }
  .back-link {
    background: none;
    border: none;
    color: var(--blue);
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    margin-bottom: 10px;
    display: inline-block;
  }
  .back-link:hover { text-decoration: underline; }
  details.item {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  details.item summary {
    list-style: none;
    cursor: pointer;
    padding: 14px 16px;
    font-weight: 600;
    font-size: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  details.item summary::-webkit-details-marker { display: none; }
  details.item summary::after {
    content: "+";
    color: var(--muted);
    font-size: 18px;
    font-weight: 400;
  }
  details.item[open] summary::after {
    content: "–";
  }
  details.item .body {
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }
  .solution {
    padding-top: 14px;
    font-size: 14px;
  }
  .solution + .solution {
    border-top: 1px dashed var(--border);
    margin-top: 14px;
  }
  .tags {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    font-size: 12px;
    color: var(--muted);
    background: #f1f5f9;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
  }
  .empty {
    color: var(--muted);
    font-style: italic;
    padding: 14px 16px;
  }
  .no-results {
    text-align: center;
    color: var(--muted);
    padding: 30px;
  }
  .search-box {
    margin-bottom: 16px;
  }
  .search-box input {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
  }
  .search-box input:focus {
    outline: 2px solid var(--blue);
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <p class="title">Стандарт СМР ММ 3.1</p>
      <p class="subtitle">АО «Тандер»</p>
    </div>
    <button id="reset-btn">Сбросить выбор</button>
  </div>
</header>

<nav class="crumbs" id="crumbs"></nav>

<main>

  <div id="search-view" class="search-box">
    <input type="text" id="search-input" placeholder="Поиск по разделу, подразделу или формулировке требования...">
  </div>

  <div id="view-sections">
    <div class="intro">
      <h2>Выберите раздел</h2>
      <p>Нажмите на раздел, чтобы перейти к подразделам и техническим решениям.</p>
    </div>
    <div class="grid" id="sections-grid"></div>
  </div>

  <div id="view-subsections" hidden>
    <button class="back-link" id="back-to-sections">← Назад к разделам</button>
    <div class="grid" id="subsections-grid"></div>
  </div>

  <div id="view-details" hidden>
    <button class="back-link" id="back-to-subsections">← Назад к подразделам</button>
    <div id="details-list"></div>
  </div>

  <div id="view-search-results" hidden>
    <div id="search-results-list"></div>
  </div>

</main>

нструкции \"Джокер\").\n3. Концептуальная опция перегородки: • по всей длине перегородки, в верхней части, выполнить монтаж сборной конструкции типа \"Джокер\" с заполнением монолитным поликарбонатом (выполняет ГП). Высота монтируемого листа монолитного поликарбоната 500 мм, отступ поликарбоната от верхней части перегородки ориентировочно 5 мм или от ножки декоративной накладки в конструкции \"Джокер\". Монтаж монолитного поликарбоната выполнять П-образными, алюминиевыми профилями. При наличии на перегородке стойки-опуска, конструкцию «Джокер» крепить к стойке-опуску через прижимные хомуты «Джокер» для трубы соответствующего диаметра.\n• по монолитному поликарбонату, со стороны посадочных мест, выполняется оклейка РИМ (см. требования Стандарта РИМ);\n• со стороны посадочных мест зоны кафе по периметру перегородки, от уровня керамогранитного плинтуса до верхней части перегородки выполняется монтаж РИМ, монтаж РИМ пленкой на пластиковой основе с визуализацией концептуальным патерном (см. требования Стандарта РИМ);\n• если за перегородкой или за одной из ее частей выполняется проход посетителей и эта часть не закрыта оборудованием, необходимо выполнить устройство защитного напольного отбойника из нержавеющей стали, с отступом от перегородки 100 мм;\n• критерии к монтажу конструкции типа \"Джокер\" в зависимости от длины перегородки: \n   - стены до 3000 мм c креплением только по бокам; - стены более 3000 до 6000 мм c одним дополнительным креплением по центру; - стены более 6000 до 9000 мм два крепления, разделено симметрично на равные части.\n4. Материал перегородки: • ОГКЛ на стальном каркасе по системе Кнауф С-111 (без утеплителя), цвет Ral 3020;\n• стоечный профиль перегородки 75 мм, сечение профилированной трубы 70*70*3 мм, цвет Ral 3020 (окраска за 2 раза); \n• монолитный поликарбонат толщиной 6 мм, прозрачный бесцветный;\n• крепление типа \"Джокер\", напольный отбойник.\nВажно: • в случае разделения перегородки колонной: колонну облицевать ОГКЛ Ral 3020 на высоту     "sol": "При совместном расположении объектов коммерческий узел учета электрической энергии для определения всего объема потреблённой электрической энергии устанавливается на Базовом объекте на границе раздела балансовой принадлежности между потребителем (базовым объектом АО «Тандер») и владельцем электроустановки (сетевая организация, арендодатель).  Для всех остальных потребителей подключенных от базового объекта (за исключением субарендаторов) приборы учета электроэнергии не устанавливаются. \nНа всех отдельно стоящих объектах коммерческий узел учета электрической энергии устанавливается на границе раздела балансовой принадлежности, между потребителем (АО «Тандер») и владельцем электроустановки (сетевая организация, арендодатель).  \nВ случае отсутствия возможности установки на границе балансовой принадлежности, необходимо предусмотреть установку узла учёта электрической энергии со средствами связи АИИС КУЭ после обязательного согласования места установки узла учета с сетевой организацией.\nДля осуществления электропитания оборудования АИИС КУЭ необходимо предусмотреть штепсельную розетку наружной установки в непосредственной близости от места установки данного оборудования, подключенную через однополюсный автоматический выключатель с уставкой по току «6 А».\nВ зависимости от места установки электрического счетчика для включения его в АИИС КУЭ применяются две схемы организации связи с сервером системы: 1. - по локальной сети Ethernet; 2. - посредством сотовой сети GSM.\n1. По локальной сети Ethernet включение электрического счетчика в АИИС КУЭ осуществляется в случае установки прибора учета в помещениях (ВРУ), т.е. в том случае если имеется возможность проложить стационарно кабель локальной сети Ethernet типа UTP с разъёмом RG45. Кабель типа UTP (витая пара) необходимо проложить от компьютера директора до ВРУ объекта, где установлен электрический счетчик. В этом случае преобразователями связи являются - MOXA NPort 5130, USR-N510 и USR-TCP232-410s.\n2. Посредст     "sol": "Приборы учета электрической энергии применить с возможностью включения их в автоматизированную информационно-измерительную систему коммерческого учета электроэнергии магазинов «Магнит». АИИС КУЭ строится на базе электросчетчиков Меркурий 236 ART - 02 PQRS, Меркурий 236 ART - 03 PQRS, Меркурий 234 ART(M) (Х)2-02 DPOBR.R, Меркурий 234 ART(M) (Х)2-03 DPBR.R, Энергомера CE307 R34.749.OA.QYUVLFZ SPds, Энергомера CE307 R34.543.OAA.SYUVLFZ SPds и Энергомера CE308 R34.543.OAA.SYUVLFZ SPds.\nПриборы учета электрической энергии и измерительные трансформаторы тока/напряжения на момент монтажа должны быть:\n- включены в ГОСРЕЕСТР;\n- классом точности 0,5S, (трансформаторы напряжения допускаются с классом точности 0,5) с периодичностью поверки не менее 8 лет;\n- с действующей поверкой, которая подтверждается соответствующим документом (паспорт формуляр или свидетельство о поверке средства измерения).\nВ случае, если приборы не удовлетворяют данным требованиям, или до окончания действующей поверки менее одного года, необходимо организовать их замену/поверку.\nЗакупка электросчетчиков и другого оборудования для АИИС КУЭ производится централизованно силами Департамента закупок ГК по заявленному в бюджете открытия оборудованию (группа затрат Оборудование АИИС КУЭ). Измерительные трансформаторы тока/напряжения закупаются из бюджета открытия и (или) бюджета редизайна на филиале.\nПри подключении узла учета электроэнергии с использованием измерительных трансформаторов тока/напряжения необходимо предусмотреть установку согласно ПУЭ г. 1.5 п. 1.5.23 клеммной испытательной переходной коробки (ККИ-1-1). Конструкция сборок и коробок зажимов расчетных счетчиков должна обеспечивать возможность их пломбирования. Закупка клеммной испытательной переходной коробки (ККИ-1-1) осуществляется из бюджета открытия и (или) бюджета редизайна на филиале.\nККИ-1-1 подбираем со следующими параметрами:\nМатериал контактов Латунь.\nВозможность опломбировки.\nНаличие сертификата соответствия.\nЕсли function uniqueSorted(arr) {
  return [...new Set(arr)].sort((a, b) => a.localeCompare(b, 'ru'));
}

function getSections() {
  return uniqueSorted(rawData.map(i => i.s));
}
function getSubsections(section) {
  return uniqueSorted(rawData.filter(i => i.s === section).map(i => i.ss));
}
function getDetails(section, subsection) {
  return uniqueSorted(rawData.filter(i => i.s === section && i.ss === subsection).map(i => i.d));
}
function getSolutions(section, subsection, detail) {
  return rawData.filter(i => i.s === section && i.ss === subsection && i.d === detail);
}

function clearChildren(el) {
  while (el.firstChild) el.removeChild(el.firstChild);
}

function appendMultiline(container, text) {
  const lines = String(text || '').split('\n');
  lines.forEach((line, idx) => {
    container.appendChild(document.createTextNode(line));
    if (idx < lines.length - 1) container.appendChild(document.createElement('br'));
  });
}

function makeCardButton(label, onClick) {
  const btn = document.createElement('button');
  btn.className = 'card-btn';
  btn.textContent = label;
  btn.onclick = onClick;
  return btn;
}

function buildSolutionBlock(item) {
  const wrap = document.createElement('div');
  wrap.className = 'solution';

  const textEl = document.createElement('div');
  appendMultiline(textEl, item.sol);
  wrap.appendChild(textEl);

  const tags = document.createElement('div');
  tags.className = 'tags';

  if (item.app) {
    const t = document.createElement('span');
    t.className = 'tag';
    t.textContent = 'Приложение: ' + item.app.replace(/\n/g, ' ');
    tags.appendChild(t);
  }
  if (item.zone) {
    const t = document.createElement('span');
    t.className = 'tag';
    t.textContent = 'Зона: ' + item.zone;
    tags.appendChild(t);
  }
  if (tags.childNodes.length) wrap.appendChild(tags);

  return wrap;
}

function buildDetailItem(section, subsection, detail) {
  const solutions = getSolutions(section, subsection, detail);

  const details = document.createElement('details');
  details.className = 'item';

  const summary = document.createElement('summary');
  summary.textContent = detail;
  details.appendChild(summary);

  const body = document.createElement('div');
  body.className = 'body';

  if (solutions.length === 0) {
    const empty = document.createElement('p');
    empty.className = 'empty';
    empty.textContent = 'Техническое решение отсутствует или не описано.';
    body.appendChild(empty);
  } else {
    solutions.forEach(sol => body.appendChild(buildSolutionBlock(sol)));
  }

  details.appendChild(body);
  return details;
}

function renderSections() {
  setView('sections');
  clearChildren(els.sectionsGrid);
  getSections().forEach(sec => {
    els.sectionsGrid.appendChild(makeCardButton(sec, () => selectSection(sec)));
  });
  updateCrumbs();
}

function renderSubsections() {
  setView('subsections');
  clearChildren(els.subsectionsGrid);
  getSubsections(state.section).forEach(ss => {
    els.subsectionsGrid.appendChild(makeCardButton(ss, () => selectSubsection(ss)));
  });
  updateCrumbs();
}

function renderDetails() {
  setView('details');
  clearChildren(els.detailsList);
  const details = getDetails(state.section, state.subsection);
  if (details.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'no-results';
    empty.textContent = 'Нет данных для отображения';
    els.detailsList.appendChild(empty);
  } else {
    details.forEach(det => {
      els.detailsList.appendChild(buildDetailItem(state.section, state.subsection, det));
    });
  }
  updateCrumbs();
}

function renderSearchResults(query) {
  state.section = null;
  state.subsection = null;
  setView('search');
  els.crumbs.innerHTML = '<span class="crumb-link" data-action="home">Главная</span><span> / Результаты поиска</span>';
  els.crumbs.querySelector('[data-action="home"]').onclick = resetAll;
  clearChildren(els.searchResultsList);
  const q = query.trim().toLowerCase();
  const matches = rawData.filter(i =>
    (i.s + ' ' + i.ss + ' ' + i.d + ' ' + i.sol).toLowerCase().includes(q)
  );

  if (matches.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'no-results';
    empty.textContent = 'Ничего не найдено по запросу «' + query + '»';
    els.searchResultsList.appendChild(empty);
    return;
  }

  matches.slice(0, 100).forEach(item => {
    const details = document.createElement('details');
    details.className = 'item';

    const summary = document.createElement('summary');
    summary.textContent = item.s + ' / ' + item.ss + ' / ' + item.d;
    details.appendChild(summary);

    const body = document.createElement('div');
    body.className = 'body';
    body.appendChild(buildSolutionBlock(item));
    details.appendChild(body);

    els.searchResultsList.appendChild(details);
  });
}

function setView(view) {
  els.sectionsView.hidden = view !== 'sections';
  els.subsectionsView.hidden = view !== 'subsections';
  els.detailsView.hidden = view !== 'details';
  els.searchResultsView.hidden = view !== 'search';
}

function updateCrumbs() {
  const parts = [];
  parts.push('<span class="crumb-link" data-action="home">Главная</span>');
  if (state.section) {
    parts.push('<span> / </span><span class="crumb-link" data-action="section">' + escapeHtml(state.section) + '</span>');
  }
  if (state.subsection) {
    parts.push('<span> / </span><span>' + escapeHtml(state.subsection) + '</span>');
  }
  els.crumbs.innerHTML = parts.join('');
  els.crumbs.querySelectorAll('[data-action]').forEach(el => {
    el.onclick = () => {
      if (el.dataset.action === 'home') resetAll();
      if (el.dataset.action === 'section') renderSubsections();
    };
  });
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function selectSection(section) {
  state.section = section;
  state.subsection = null;
  renderSubsections();
}

function selectSubsection(subsection) {
  state.subsection = subsection;
  renderDetails();
}

function resetAll() {
  state.section = null;
  state.subsection = null;
  els.searchInput.value = '';
  renderSections();
}

document.getElementById('reset-btn').onclick = resetAll;
document.getElementById('back-to-sections').onclick = () => { state.section = null; renderSections(); };
document.getElementById('back-to-subsections').onclick = () => { state.subsection = null; renderSubsections(); };

let searchTimer = null;
els.searchInput.addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  const value = e.target.value;
  searchTimer = setTimeout(() => {
    if (value.trim().length === 0) {
      resetAll();
    } else {
      renderSearchResults(value);
    }
  }, 200);
});

renderSections();
</script>
</body>
</html>
